[package]
name = "bascan-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.9"
include_dir = { version = "0.7.4", features = ["glob"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["full"] }
tower-http = { version = "0.6.8", features = ["cors", "fs"] }
urlencoding = "2.1.3"
